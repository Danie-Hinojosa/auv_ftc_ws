/**/auv_controller:
  ros__parameters:
    control_rate_hz:    50.0
    thrust_max:          25.0     # N (per actuator channel; was 50, halved to keep Gazebo's solver stable)
    thrust_min:         -25.0
    buoyancy_force:     250.0     # mass*g*1.02 for 25 kg (near neutral, +0.2% positive)
    metacentric_height:   0.05    # m, GM positive = self-righting

    # Outer loop (position -> velocity reference) gains.
    # cruise_speed dropped from 0.6 to 0.3: at 0.6 m/s plus a ~0.21 rad/s
    # realized yaw rate, a 90 deg turn travels 4.5 m forward -- more than
    # the 3 m segments of the lawnmower, so the AUV always overshot.
    # kp_yaw bumped 1.0 -> 1.5 so r_ref saturates at smaller bearing
    # errors and the outer loop starts the turn earlier.
    # lookahead 2.0 -> 3.0 anticipates the wp transition over one full
    # segment, so the goal is blending toward the next wp long before
    # the AUV is on top of the current one.
    kp_surge:             0.6
    kp_heave:             0.5
    kp_yaw:               1.5
    cruise_speed:         0.3
    waypoint_radius:      0.8
    approach_decel:       3.0
    lookahead:            3.0

    # Trajectory: hold | waypoints | lawnmower | figure8 | circle
    trajectory:        "lawnmower"
    traj_scale:           6.0    # m
    traj_depth:          -2.0    # m  (close to spawn z=-1 for quick settle)

    # Water/air interface (used to zero buoyancy + drag above the surface).
    surface_z:            0.0    # world-frame z of the water plane (m)
    hull_half_height:     0.15   # smooth submersion ramp width (m)

    # First-order LPF on the wrench output. Smooths step changes the
    # solver can't absorb. Set to 0 to disable.
    wrench_tau:           0.1    # s

    # Sliding-mode robustifier (Section 5.2 extension).
    # Layered on top of the T-S fuzzy output: u_virtual = u_TS + u_SMC.
    # Order: [surge, heave, pitch, yaw].
    smc_enabled:       true
    smc_eta:           [4.0, 4.0, 1.0, 2.5]    # switching gains (~N or N*m)
    smc_phi:           [0.08, 0.08, 0.05, 0.05] # boundary layer (m/s or rad/s)

/**/reference_generator:
  ros__parameters:
    pattern:           "constant"     # outer loop drives x_ref now;
    rate_hz:               5.0        # the legacy generator just keeps
    u0:                    0.0        # the topic alive at low rate
    yaw_amplitude:         0.0
    yaw_period_s:         60.0
    heave_amp:             0.0
    step_period_s:        40.0
